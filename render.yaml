services:
  - type: web
    name: jimsai-training-service
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./services/training-pipeline/Dockerfile
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: JIMS_STORAGE_BACKEND
        value: production
      - key: JIMS_STRICT_PROVIDER_STARTUP
        value: "true"
      - key: JIMS_AUTH_PROVIDER
        value: supabase
      - key: JIMS_AUTH_REQUIRED
        value: "true"
      - key: JIMS_CELERY_KEY_PREFIX
        value: jimsai_
      - key: JIMS_CLOUD_AUTHORITATIVE
        value: "true"
      - key: JIMS_KAGGLE_MAX_PANEL_ITEMS
        value: "500"
      - key: JIMS_EMBEDDING_SERVICE_URL
        value: https://jimstechai-jimsai-embedding-service.hf.space
      - key: JIMS_EMBEDDING_SERVICE_TOKEN
        sync: false
      - key: JIMS_RENDER_AGENT_TOKEN
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: CF_ACCOUNT_ID
        sync: false
      - key: CF_R2_BUCKET
        sync: false
      - key: CF_R2_ACCESS_KEY
        sync: false
      - key: CF_R2_SECRET_KEY
        sync: false
      - key: CF_VECTORIZE_INDEX
        sync: false
      - key: CF_VECTORIZE_API_TOKEN
        sync: false
      - key: KAGGLE_USERNAME
        sync: false
      - key: KAGGLE_API_TOKEN
        sync: false
      - key: KAGGLE_DATASET_OWNER
        sync: false
      - key: GROQ_API_KEY
        sync: false
