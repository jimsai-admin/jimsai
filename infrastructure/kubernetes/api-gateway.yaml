apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: jimsai/api-gateway:local
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: jimsai-env
